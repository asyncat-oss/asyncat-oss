<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asyncat</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 640px;
      height: 148px;
      overflow: hidden;
      border-radius: 14px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      /* transparent lets macOS vibrancy show through; on Windows the window bg color takes over */
      background: transparent;
      border-radius: 14px;
      color: #e2e8f0;
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    /* ── Top row ── */
    .top {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #logoFb { font-size: 13px; line-height: 1; }

    #logoImg {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      display: none;
    }

    .name {
      font-size: 12px;
      font-weight: 600;
      color: #4b5563;
      letter-spacing: 0.02em;
      user-select: none;
    }

    .spacer { flex: 1; }

    .status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #374151;
      user-select: none;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .dot.stopped { background: #ef4444; }

    /* ── Input ── */
    .input-row {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 10px;
      padding: 0 8px 0 14px;
      height: 42px;
      gap: 6px;
      transition: border-color 0.16s;
    }

    .input-row:focus-within {
      border-color: rgba(99, 102, 241, 0.5);
    }

    input {
      flex: 1;
      height: 100%;
      background: none;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      caret-color: #818cf8;
    }

    input::placeholder { color: #2d3a50; }

    .send {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: transparent;
      color: #374151;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }

    .send.on,
    .send:hover { background: #6366f1; color: #fff; }
    .send:active { transform: scale(0.88); }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-open {
      flex: 1;
      height: 26px;
      border-radius: 7px;
      border: 1px solid rgba(99, 102, 241, 0.22);
      background: rgba(99, 102, 241, 0.09);
      color: #818cf8;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-open:hover {
      background: rgba(99, 102, 241, 0.18);
      border-color: rgba(99, 102, 241, 0.4);
      color: #a5b4fc;
    }

    .btn-quit {
      height: 26px;
      padding: 0 12px;
      border-radius: 7px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: transparent;
      color: #374151;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-quit:hover {
      background: rgba(239, 68, 68, 0.09);
      border-color: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .hint {
      margin-left: 4px;
      font-size: 10.5px;
      color: #1f2937;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="brand">
      <span id="logoFb">🐱</span>
      <img id="logoImg" alt="" />
      <span class="name">Asyncat</span>
    </div>
    <div class="spacer"></div>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="statusTxt">…</span>
    </div>
  </div>

  <div class="input-row">
    <input id="inp" type="text" placeholder="What can I help you with?" autocomplete="off" spellcheck="false" />
    <button class="send" id="sendBtn" aria-label="Send">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M2.5 8h11M9.5 4l4 4-4 4" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="footer">
    <button class="btn-open" id="btnOpen">Open Asyncat</button>
    <button class="btn-quit" id="btnQuit">Quit</button>
    <span class="hint">esc to close</span>
  </div>

  <script>
    const inp       = document.getElementById('inp');
    const sendBtn   = document.getElementById('sendBtn');
    const dot       = document.getElementById('dot');
    const statusTxt = document.getElementById('statusTxt');
    const logoImg   = document.getElementById('logoImg');
    const logoFb    = document.getElementById('logoFb');

    const iconPath = new URLSearchParams(location.search).get('iconPath');
    if (iconPath) {
      logoImg.src = iconPath;
      logoImg.onload = () => { logoImg.style.display = 'block'; logoFb.style.display = 'none'; };
    }

    inp.focus();

    inp.addEventListener('input', () => sendBtn.classList.toggle('on', inp.value.trim().length > 0));
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); go(); }
      if (e.key === 'Escape') window.close();
    });

    sendBtn.addEventListener('click', go);
    document.getElementById('btnOpen').addEventListener('click', () => window.asyncat.openApp());
    document.getElementById('btnQuit').addEventListener('click', () => window.asyncat.quit());

    function go() { window.asyncat.newChat(inp.value.trim()); }

    (async () => {
      try {
        const { running } = await window.asyncat.getStatus();
        dot.className = 'dot' + (running ? '' : ' stopped');
        statusTxt.textContent = running ? 'Running' : 'Stopped';
      } catch { statusTxt.textContent = '—'; }
    })();
  </script>
</body>
</html>
